    <!-- Critical CSS (Optional - can be added inline for better performance) -->
    <style>
      /* Critical loading styles */
      html {
        scroll-behavior: smooth;
      }
      #root {
        opacity: 0;
        animation: fadeIn 0.5s ease-in forwards;
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXX"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div id="root"></div>

    <!-- Loading indicator (optional) -->
    <div
      id="loading-indicator"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      <div style="text-align: center">
        <div
          style="
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6a1b9a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
          "
        ></div>
        <p style="color: #6a1b9a; font-family: 'Lato', sans-serif">
          Loading African School of Customer Success...
        </p>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Remove loading indicator when app loads
      window.addEventListener("load", function () {
        setTimeout(function () {
          const loadingIndicator = document.getElementById("loading-indicator");
          if (loadingIndicator) {
            loadingIndicator.style.opacity = "0";
            setTimeout(() => (loadingIndicator.style.display = "none"), 300);
          }
        }, 500);
      });

      // Service Worker Registration (for PWA)
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch((err) => {
            console.log("ServiceWorker registration failed: ", err);
          });
        });
      }
    </script>

    <style>
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </body>
