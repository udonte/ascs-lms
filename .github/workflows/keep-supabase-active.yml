name: Keep Supabase Project Active

on:
  schedule:
    # Runs at 00:00 UTC every Monday and Thursday
    # This keeps the project well within Supabase's 7-day inactivity limit
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  ping-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Send API Ping to Supabase Auth Health Check
        run: |
          curl -i -X GET "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/auth/v1/health" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --max-time 30 \
            --fail
